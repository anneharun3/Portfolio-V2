name: Nightly Deployment

on:
  schedule:
    # Runs every day at 12:00 AM midnight Central Time (05:00 UTC)
    - cron: '0 5 * * *'
  workflow_dispatch: # Allows manual trigger anytime from GitHub Actions tab

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify Nightly Build Hook
        run: |
          curl -X POST -d {} ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
